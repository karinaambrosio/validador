<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validador de llaves</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(180deg, #a0c4ff, #bdb2ff, #ffc6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: #fff;
      border: 4px solid #6c5ce7;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(108, 92, 231, 0.5);
      text-align: center;
      padding: 30px;
      width: 400px;
    }

    h2 {
      color: #6c5ce7;
      margin-bottom: 20px;
      text-shadow: 2px 2px #bdb2ff;
    }

    input {
      width: 80%;
      padding: 10px;
      border: 3px solid #6c5ce7;
      border-radius: 5px;
      background-color: #f1f2f6;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      color: #2d3436;
      margin-bottom: 15px;
    }

    button {
      background-color: #6c5ce7;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Press Start 2P', cursive;
      font-size: 12px;
      box-shadow: 3px 3px #bdb2ff;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background-color: #a29bfe;
    }

    #resultado {
      margin-top: 20px;
      font-size: 14px;
    }

    .valido {
      color: #00b894;
      text-shadow: 1px 1px #55efc4;
    }

    .invalido {
      color: #d63031;
      text-shadow: 1px 1px #fab1a0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>VALIDADOR DE LLAVES</h2>
    <input type="text" id="cadena" placeholder="Ingrese secuencia de llaves para verificar">
    <button onclick="validar()">VALIDAR</button>
    <p id="resultado"></p>
  </div>

  <script>
    function validar() {
      const cadena = document.getElementById("cadena").value;
      const pila = [];
      let valido = true;

      if (/[^{}]/.test(cadena)) {
        document.getElementById("resultado").innerHTML = "Solo se permiten llaves {  }";
        document.getElementById("resultado").className = "invalido";
        return;
      }

      for (let i = 0; i < cadena.length; i++) {
        const c = cadena.charAt(i);
        if (c === '{') pila.push(c);
        else if (c === '}') {
          if (pila.length === 0) {
            valido = false;
            break;
          }
          pila.pop();
        }
      }

      if (valido && pila.length === 0) {
        document.getElementById("resultado").innerHTML = "Cadena válida";
        document.getElementById("resultado").className = "valido";
      } else {
        document.getElementById("resultado").innerHTML = "Cadena inválida";
        document.getElementById("resultado").className = "invalido";
      }
    }
  </script>
</body>
</html>
